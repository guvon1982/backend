openapi: 3.1.1
info: 
  title: Minha API
  description: Projeto de uma API REST desenvolvida com Expressjs
  version: 0.1.0
servers:
  - url: http://localhost:3000/
    description: Ambiente de Desenvolvimento
tags:
  - tarefas:
paths:
  /tarefas:
   get:
    tags:
      - tarefas
    responses:
      200:
        content:
          application/json:
            schema:
              type: array
      500:
        content:
          application/json:
            schema:
              type: object        
   post:
     tags:
       - tarefas
     requestBody:
       content:
         application/json:
           schema:
             type: object
     responses:
       201:
         content:
           application/json:
             schema:
               $ref: '#/components/schemas/Tarefa'
       422:
         content:
           application/json:
             schema:
               type: object
       500:
         content:
           application/json:
             schema:
               type: object       
  /tarefas/id:
    get:
      tags:
        - tarefas
      parameters:
        - in: path
          name: tarefaId
          required: true
          schema:
            type: string
      responses:
        200:
          content:
            application/json:
              schema:
                type: object
        404:
          content:
            application/json:
              schema:
                type: object
        500:
          content:
            application/json:
              schema:
                type: object
    put:
      tags:
        - tarefas
      parameters:
        - in: path
          name: tarefaId
          required: true
          schema:
            type: string
      requestBody:
        content:
          application/json:
            schema:
              type: object
      responses:        
        200:
          content:
            application/json:
              schema:
                type: object
        404:
          content:
            application/json:
              schema:
                type: object
        500:
          content:
            application/json:
              schema:
                type: object
    delete:
      tags:
        - tarefas
      parameters:
        - in: path
          name: tarefaId
          required: true
          schema:
            type: string
      responses:        
        204:
          content:
        400:
          content:
            application/json:
              schema:
                type: object
        404:
          content:
            application/json:
              schema:
                type: object        
        500:
          content:
            application/json:
              schema:
                type: object
components:
  schemas:
    Tarefa:
      type: object
      properties:
        _id:
          type: string
        nome:
          type: string
        concluida:
          type: boolean  